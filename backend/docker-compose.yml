version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: student-tracking-system-db
    environment:
      POSTGRES_DB: student_tracking_dev
      POSTGRES_USER: student_tracking
      POSTGRES_PASSWORD: student_tracking_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_tracking -d student_tracking_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-tracking-system-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/student_tracking_dev
      SPRING_DATASOURCE_USERNAME: student_tracking
      SPRING_DATASOURCE_PASSWORD: student_tracking_dev_password
      JWT_SECRET: ZGV2LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24tbXVzdC1iZS0yNTZiaXRz
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
