spring:
  profiles:
    active: dev
  application:
    name: student-tracking-system-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # AI / LLM integration (Spring AI + Anthropic Claude). A non-blank placeholder key lets
  # the model bean construct without credentials; ChatService only calls the model when a
  # real key (starting with sk-ant-) is configured, otherwise it returns a stub response.
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:placeholder-set-a-real-sk-ant-key}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
          temperature: 0.7
          max-tokens: 1024

jwt:
  secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24tbXVzdC1iZS0yNTZiaXRz}
  expiration: 86400000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
