spring:
  profiles:
    active: dev
  application:
    name: student-tracking-system-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24tbXVzdC1iZS0yNTZiaXRz}
  expiration: 86400000
  refresh-expiration: 604800000

# AI / LLM integration (LangChain4j). Until a real ANTHROPIC_API_KEY is set, the chat
# endpoint returns a placeholder response instead of calling the model.
ai:
  provider: anthropic
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:placeholder-set-a-real-sk-ant-key}
    model-name: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
    temperature: 0.7
    max-tokens: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
