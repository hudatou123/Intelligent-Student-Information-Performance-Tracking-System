spring:
  profiles:
    active: dev
  application:
    name: student-tracking-system-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # AI / LLM integration: Spring AI's OpenAI client pointed at Google's Gemini API via its
  # OpenAI-compatible endpoint (uses a Google AI Studio API key — no GCP project needed).
  # A non-blank placeholder key lets the model bean construct without credentials; ChatService
  # only calls the model when a real key is configured, otherwise it returns a stub response.
  ai:
    openai:
      api-key: ${GOOGLE_API_KEY:placeholder-set-a-real-google-api-key}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions
        options:
          model: ${GEMINI_MODEL:gemini-3.5-flash-lite}
          temperature: 0.7
          max-tokens: 1024

jwt:
  secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24tbXVzdC1iZS0yNTZiaXRz}
  expiration: 86400000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
