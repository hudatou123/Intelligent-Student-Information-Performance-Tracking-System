services:
  postgres:
    image: postgres:16-alpine
    container_name: gradems-db
    environment:
      POSTGRES_DB: gradems_dev
      POSTGRES_USER: gradems
      POSTGRES_PASSWORD: gradems_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradems -d gradems_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gradems-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gradems_dev
      SPRING_DATASOURCE_USERNAME: gradems
      SPRING_DATASOURCE_PASSWORD: gradems_dev_password
      JWT_SECRET: dev-secret-key-at-least-256-bits-long-for-hmac
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gradems-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
