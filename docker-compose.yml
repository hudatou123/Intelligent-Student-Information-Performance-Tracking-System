services:
  postgres:
    image: postgres:16-alpine
    container_name: student-tracking-system-db
    environment:
      POSTGRES_DB: student_tracking_dev
      POSTGRES_USER: student_tracking
      POSTGRES_PASSWORD: student_tracking_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_tracking -d student_tracking_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-tracking-system-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/student_tracking_dev
      SPRING_DATASOURCE_USERNAME: student_tracking
      SPRING_DATASOURCE_PASSWORD: student_tracking_dev_password
      JWT_SECRET: dev-secret-key-at-least-256-bits-long-for-hmac
      # Leave unset to use the placeholder stub; set in your shell/.env to enable live AI.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-tracking-system-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
